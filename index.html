<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoucherVault | Play, Share, Redeem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="hud" class="hidden">
            <span>🪙 Coins: <span id="coin-count">0</span></span>
            <span id="difficulty-tag">LEVEL: STABLE</span>
        </div>

        <div id="menu" class="card">
            <h1>🗝️ VoucherVault</h1>
            <p>1 Coin = 1% Discount.<br>The more you play, the harder it gets.</p>
            <div class="game-options">
                <button class="btn" onclick="startGame('Catch')">Play Catch the Coin</button>
                <button class="btn secondary" onclick="alert('Coming soon in next update!')">Solitaire / Mahjong</button>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <div id="game-area"></div>
            <button class="btn collect-btn" onclick="showRewardScreen()">REDEEM NOW</button>
        </div>

        <div id="reward-screen" class="hidden">
            <div class="card">
                <h2>🎉 Vault Results</h2>
                <div class="discount-badge" id="final-discount">0%</div>
                
                <div class="mechanics">
                    <button class="btn gamble-btn" id="gamble-btn" onclick="triggerGreedMechanic()">
                        💰 Double or Nothing? (Risk)
                    </button>
                    <button class="btn share-btn" onclick="shareToBoost()">
                        📢 Share to Friends (+5% Bonus)
                    </button>
                </div>

                <hr>
                <p>Your Final Coupon:</p>
                <div id="coupon-code" class="code-box"></div>
                <button class="btn secondary" onclick="location.reload()">TRY AGAIN</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
